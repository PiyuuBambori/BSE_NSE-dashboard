services:
  - type: web
    name: corporate-news-dashboard
    runtime: static
    buildCommand: npm install && npm run build
    publishDir: dist
    headers:
      - key: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
